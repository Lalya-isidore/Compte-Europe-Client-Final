<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compte Europe - Mode Hors-ligne</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #4b59d9;
            --primary-blue-dark: #3a48c7;
            --white: #FFFFFF;
            --gray-50: #F9FAFB;
            --gray-400: #9CA3AF;
            --gray-600: #4B5563;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--white);
            color: #1a1a1a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
        }

        .container {
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 2.5rem;
            position: relative;
        }

        .logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(75, 89, 217, 0.2);
        }

        .illustration {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            color: var(--primary-blue);
            opacity: 0.9;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            margin-bottom: 1rem;
            color: var(--primary-blue);
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--gray-600);
            margin-bottom: 2.5rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            background: rgba(75, 89, 217, 0.08);
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-blue);
            margin-bottom: 2rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: #ff4d4d;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 12px rgba(255, 77, 77, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-retry {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-blue-dark) 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(75, 89, 217, 0.3);
            text-transform: none;
        }

        .btn-retry:active {
            transform: scale(0.97);
            box-shadow: 0 5px 15px rgba(75, 89, 217, 0.2);
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--gray-400);
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-container">
            <img src="image/image.png" alt="Compte Europe Logo" class="logo">
        </div>

        <div class="status-badge">
            <span class="dot"></span>
            Mode Hors-ligne
        </div>

        <h1>Oups ! Connexion perdue</h1>
        <p>Il semble que vous ne soyez plus connecté à Internet. Vos services bancaires Compte Europe nécessitent une connexion active pour fonctionner en toute sécurité.</p>

        <button class="btn-retry" onclick="window.location.reload()">Actualiser la page</button>

        <div class="footer">
            &copy; 2026 Compte Europe. Sécurisé & Chiffré.
        </div>
    </div>

    <script>
        // Recharge automatiquement quand la connexion revient
        window.addEventListener('online', () => {
            window.location.reload();
        });

        // Vibration subtile sur mobile
        document.querySelector('.btn-retry').addEventListener('click', () => {
            if ('vibrate' in navigator) {
                navigator.vibrate(50);
            }
        });
    </script>
</body>

</html>
